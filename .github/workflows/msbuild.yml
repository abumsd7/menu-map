name: Build Menu Map

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
    # 1. Checkout your menu-map repository
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    # 2. Clone the Plugin-SDK dependency
    - name: Checkout Plugin-SDK
      uses: actions/checkout@v4
      with:
        repository: 'DK22Pac/plugin-sdk'
        path: 'plugin-sdk'

    # 3. Setup MSBuild (Visual Studio 2022 tools)
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    # 4. Set up the PLUGIN_SDK_DIR environment variable
    - name: Set Plugin-SDK Environment Variable
      run: |
        echo "PLUGIN_SDK_DIR=${{ github.workspace }}\plugin-sdk" >> $GITHUB_ENV
        [Environment]::SetEnvironmentVariable("PLUGIN_SDK_DIR", "${{ github.workspace }}\plugin-sdk", "User")

    # 5. Compile Plugin-SDK components (Required for your project's 'links' filter)
    # This generates the static .lib files your project links against.
    - name: Build Plugin-SDK Libraries
      run: |
        msbuild plugin-sdk/plugin_sdk.sln /p:Configuration=Release /p:Platform=Win32 /m

    # 6. Run Premake to generate project files inside "project_files"
    - name: Run Premake
      run: |
        .\premake5.exe vs2022

    # 7. Build all three configurations (San Andreas, Vice City, GTA III)
    - name: Build MenuMap (San Andreas)
      run: |
        msbuild project_files/menu-map.sln /p:Configuration=ReleaseSA /p:Platform=Win32 /m

    - name: Build MenuMap (Vice City)
      run: |
        msbuild project_files/menu-map.sln /p:Configuration=ReleaseVC /p:Platform=Win32 /m

    - name: Build MenuMap (GTA III)
      run: |
        msbuild project_files/menu-map.sln /p:Configuration=ReleaseIII /p:Platform=Win32 /m

    # 8. Collect and Upload compiled .asi binaries from your target directory
    - name: Upload Finished ASI Plugins
      uses: actions/upload-artifact@v4
      with:
        name: menu-map latest
        path: |
          output/asi/*.asi
