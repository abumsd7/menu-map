name: Build Menu Map

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
    # 1. Checkout your menu-map repository
    - name: Checkout Repository
      uses: actions/checkout@v6
      with:
        submodules: recursive

    # 2. Clone the Plugin-SDK dependency into a subfolder
    - name: Checkout Plugin-SDK
      uses: actions/checkout@v6
      with:
        repository: 'DK22Pac/plugin-sdk'
        path: 'plugin-sdk'
        submodules: recursive

    # 3. Setup MSBuild (Visual Studio 2022 tools)
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v3

    # 4. Generate and compile the Plugin-SDK Libraries using their exact internal flags
    - name: Generate and Build Plugin-SDK Libraries
      shell: cmd
      run: |
        cd plugin-sdk
        set PLUGIN_SDK_DIR=%CD%
        
        echo ::group::Generate Plugin-SDK Solution
        call "tools\generate\Visual Studio.bat"
        echo ::groupEnd::
        
        echo ::group::Build SDK GTA III static lib
        msbuild plugin.sln /property:Configuration=zDebug /property:Platform="Mixed Platforms" /target:plugin_iii /m /verbosity:minimal
        echo ::groupEnd::
        
        echo ::group::Build SDK GTA VC static lib
        msbuild plugin.sln /property:Configuration=zDebug /property:Platform="Mixed Platforms" /target:plugin_vc /m /verbosity:minimal
        echo ::groupEnd::
        
        echo ::group::Build SDK GTA SA static lib
        msbuild plugin.sln /property:Configuration=zDebug /property:Platform="Mixed Platforms" /target:plugin_sa /m /verbosity:minimal
        echo ::groupEnd::

    # 5. Set up environment variables globally for the Menu Map build process
    - name: Set Environment Variables
      run: |
        echo "PLUGIN_SDK_DIR=${{ github.workspace }}\plugin-sdk" >> $GITHUB_ENV
        [Environment]::SetEnvironmentVariable("PLUGIN_SDK_DIR", "${{ github.workspace }}\plugin-sdk", "User")

    # 6. Run your root Premake to generate your project files
    - name: Run Project Premake
      run: |
        .\premake5.exe vs2022

    # 7. Build MenuMap configurations using your local premake5.lua specifications
    - name: Build MenuMap (San Andreas)
      run: |
        msbuild project_files/menu-map.sln /p:Configuration=ReleaseSA /p:Platform=Win32 /m /verbosity:minimal

    - name: Build MenuMap (Vice City)
      run: |
        msbuild project_files/menu-map.sln /p:Configuration=ReleaseVC /p:Platform=Win32 /m /verbosity:minimal

    - name: Build MenuMap (GTA III)
      run: |
        msbuild project_files/menu-map.sln /p:Configuration=ReleaseIII /p:Platform=Win32 /m /verbosity:minimal

    # 8. Collect and Upload your compiled plugins (.asi files)
    - name: Upload Finished ASI Plugins
      uses: actions/upload-artifact@v4
      with:
        name: menu-map latest
        path: |
          output/asi/*.asi
